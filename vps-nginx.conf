# Cấu trúc Nginx cho NextJS (Voz Clone)
# File này anh tải lên VPS rồi ném nội dung của nó vào: /etc/nginx/sites-available/voz
# Lưu ý: Sửa lại chữ "danongthongminh.com" thành cái TÊN MIỀN THẬT của anh!

server {
    listen 80;
    server_name danongthongminh.com www.danongthongminh.com; # THAY TÊN MIỀN CỦA ANH VÀO ĐÂY

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Bắt buộc cho tính năng đăng nhập NextAuth:
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
